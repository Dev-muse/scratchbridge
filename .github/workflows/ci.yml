name: Continuous Integration Suite

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Cache pnpm Package Manager
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: |
            - recursive: true
              args: [--frozen-lockfile]

      - name: Code Syntax Lint Verification
        run: pnpm lint

      - name: Type System Verification
        run: pnpm tsc --noEmit

      - name: Execute Logic Unit Tests
        run: pnpm test